name: Auto Version Bump

on:
  push:
    branches:
      - main
    paths-ignore:
      - "*.md"
      - ".github/workflows/**"
      - "tests/**"
      - "docs/**"

# Only runs on direct pushes to main - NEVER on PRs
# Secrets are NOT available to fork PRs by GitHub policy
permissions:
  contents: write

jobs:
  bump:
    runs-on: ubuntu-latest
    # Extra guard: only run on the main repo, not forks
    if: |
      github.repository == 'matanbaruch/amplifi-alien-exporter' &&
      !contains(github.event.head_commit.message, '[skip ci]') &&
      !contains(github.event.head_commit.message, 'chore: bump version')

    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GH_PAT }}
          fetch-depth: 0

      - name: Configure git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Read and bump version
        id: bump
        run: |
          CURRENT=$(grep -oP 'VERSION\s*=\s*"\K[^"]+' amplifi_exporter.py)
          echo "Current version: $CURRENT"
          MAJOR=$(echo $CURRENT | cut -d. -f1)
          MINOR=$(echo $CURRENT | cut -d. -f2)
          PATCH=$(echo $CURRENT | cut -d. -f3)
          NEW_PATCH=$((PATCH + 1))
          NEW_VERSION="${MAJOR}.${MINOR}.${NEW_PATCH}"
          echo "New version: $NEW_VERSION"
          sed -i "s/VERSION = \"${CURRENT}\"/VERSION = \"${NEW_VERSION}\"/" amplifi_exporter.py
          echo "OLD_VERSION=${CURRENT}" >> $GITHUB_OUTPUT
          echo "NEW_VERSION=${NEW_VERSION}" >> $GITHUB_OUTPUT

      - name: Commit version bump
        run: |
          git add amplifi_exporter.py
          git commit -m "chore: bump version ${{ steps.bump.outputs.OLD_VERSION }} → ${{ steps.bump.outputs.NEW_VERSION }} [skip ci]"
          git push

      - name: Create and push tag
        run: |
          git tag "v${{ steps.bump.outputs.NEW_VERSION }}"
          git push origin "v${{ steps.bump.outputs.NEW_VERSION }}"
