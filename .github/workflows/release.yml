name: Release

on:
  push:
    tags:
      - "v*"

# Only runs on tag push - completely isolated from PRs
permissions:
  contents: write
  packages: write

jobs:
  release:
    runs-on: ubuntu-latest
    # Extra guard: only on main repo
    if: github.repository == 'matanbaruch/amplifi-alien-exporter'

    steps:
      - uses: actions/checkout@v4

      - name: Extract version
        id: version
        run: echo "VERSION=${GITHUB_REF#refs/tags/v}" >> $GITHUB_OUTPUT

      - name: Run tests before release
        run: python -m unittest discover tests/ -v

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: |
            ghcr.io/matanbaruch/amplifi-alien-exporter:${{ steps.version.outputs.VERSION }}
            ghcr.io/matanbaruch/amplifi-alien-exporter:latest
          labels: |
            org.opencontainers.image.source=https://github.com/matanbaruch/amplifi-alien-exporter
            org.opencontainers.image.version=${{ steps.version.outputs.VERSION }}

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          name: "v${{ steps.version.outputs.VERSION }}"
