name: Tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
    # Use pull_request (NOT pull_request_target) - fork PRs never get secrets

# Minimal permissions - read only
permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.10", "3.11", "3.12"]

    steps:
      - uses: actions/checkout@v4
        # No token needed - public repo read is fine with GITHUB_TOKEN default

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Run tests
        run: python -m unittest discover tests/ -v

      - name: Verify no sensitive defaults in code
        run: |
          if grep -r "192\.168\.149\.1\|0503338385" amplifi_exporter.py; then
            echo "ERROR: Sensitive data found in source!"
            exit 1
          fi
          echo "Clean - no sensitive defaults found"
